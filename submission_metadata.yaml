# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Anthropic) extensively for architectural design, code review,
  bug detection, and iterative refinement of the pipeline. Claude helped
  identify scoring bugs (score saturation, location gate errors, missing JD
  traps), suggested fixes, and reviewed all four source files against the
  submission spec and job description. All engineering decisions, design
  choices, and final code were authored and validated by the team. No
  candidate data was fed to any external LLM.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-pass heuristic-semantic pipeline with precomputed embeddings.

  Pass 1 (heuristic funnel, ~25s): Scans all 100K candidates using O(1)
  string-blob matching. Applies hard disqualification gates (honeypots,
  ghost profiles, location, experience floor) and six JD trap penalties
  (LangChain tourist, pure research, title chaser, hands-off architect,
  pure consulting, keyword stuffer, CV-without-NLP). Boosts candidates with
  evaluation framework depth (NDCG/MRR/MAP), production shipping history,
  and verified core skill depth across the full retrieval/ranking stack
  (FAISS, Qdrant, Elasticsearch, sentence-transformers, LoRA, etc.).
  Outputs top 3,000 finalists.

  Pass 2 (semantic re-ranking, ~60s): Encodes all 3,000 finalists in a
  single vectorised batch using all-MiniLM-L6-v2, computing cosine
  similarity against a curated JD embedding. Final score is an additive
  blend: semantic (45%) + heuristic base (45%) + behavioral bonus (10%).
  Behavioral bonus incorporates 9 Redrob signals: response rate, notice
  period, GitHub activity, open-to-work flag, interview completion rate,
  avg response time, profile completeness, saved-by-recruiters count, and
  offer acceptance rate.

  Total runtime: ~180-230s on CPU, well within the 5-minute Stage 3 limit.

